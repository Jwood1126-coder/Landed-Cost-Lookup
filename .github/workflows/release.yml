name: Build Desktop App

# Produces a single portable Lookup.exe — no installer, no wizard.
# Download the file, double-click, done.
#
#   - Push a version tag (e.g. `git tag v2.2.0 && git push origin v2.2.0`)
#     -> attaches Lookup.exe to a GitHub Release.
#   - Or run this workflow manually from the Actions tab ("Run workflow")
#     -> uploads Lookup.exe as a downloadable artifact on the run.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      # Needed to create/upload the GitHub Release.
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: landed-cost-modern/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: landed-cost-modern/src-tauri -> target

      - name: Install frontend dependencies
        working-directory: landed-cost-modern
        run: npm ci

      # --no-bundle compiles the standalone .exe but skips the NSIS/MSI
      # installers, so we get a single portable executable to run directly.
      - name: Build portable Windows exe
        working-directory: landed-cost-modern
        run: npm run tauri build -- --no-bundle

      - name: Upload portable exe (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: Lookup-windows
          if-no-files-found: error
          path: landed-cost-modern/src-tauri/target/release/Lookup.exe

      - name: Publish release with portable exe (tag runs)
        if: ${{ startsWith(github.ref, 'refs/tags/') }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "landed-cost-modern/src-tauri/target/release/Lookup.exe#Lookup.exe" \
            --title "Lookup ${GITHUB_REF_NAME}" \
            --notes "Portable app — **download Lookup.exe below and double-click to run.** No installation, no setup, no Python." \
            --clobber || \
          gh release upload "${GITHUB_REF_NAME}" \
            "landed-cost-modern/src-tauri/target/release/Lookup.exe#Lookup.exe" \
            --clobber
