<?xml version="1.0" encoding="UTF-8"?>
<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="14.4" fill="#0f1115"/>
  <circle cx="16" cy="16" r="13.44" fill="#161922" stroke="#232736" stroke-width="1"/>

  <!-- Magnifying glass -->
  <g filter="url(#glow)">
    <!-- Glass circle -->
    <circle cx="13.44" cy="13.44" r="8"
            fill="none" stroke="url(#grad)" stroke-width="2"/>

    <!-- Handle -->
    <line x1="19.04" y1="19.04"
          x2="24.96" y2="24.96"
          stroke="url(#grad)" stroke-width="2.6" stroke-linecap="round"/>

    <!-- Data lines inside glass -->
    <line x1="9.44" y1="11.04"
          x2="17.439999999999998" y2="11.04"
          stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="9.44" y1="13.84"
          x2="15.04" y2="13.84"
          stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="9.44" y1="16.64"
          x2="16.24" y2="16.64"
          stroke="#2dd4bf" stroke-width="1.2" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>