<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="230.4" fill="#0f1115"/>
  <circle cx="256" cy="256" r="215.04" fill="#161922" stroke="#232736" stroke-width="16"/>

  <!-- Magnifying glass -->
  <g filter="url(#glow)">
    <!-- Glass circle -->
    <circle cx="215.04" cy="215.04" r="128"
            fill="none" stroke="url(#grad)" stroke-width="32"/>

    <!-- Handle -->
    <line x1="304.64" y1="304.64"
          x2="399.36" y2="399.36"
          stroke="url(#grad)" stroke-width="41.6" stroke-linecap="round"/>

    <!-- Data lines inside glass -->
    <line x1="151.04" y1="176.64"
          x2="279.03999999999996" y2="176.64"
          stroke="#2dd4bf" stroke-width="19.2" stroke-linecap="round" opacity="0.8"/>
    <line x1="151.04" y1="221.44"
          x2="240.64" y2="221.44"
          stroke="#2dd4bf" stroke-width="19.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="151.04" y1="266.24"
          x2="259.84" y2="266.24"
          stroke="#2dd4bf" stroke-width="19.2" stroke-linecap="round" opacity="0.5"/>
  </g>
</svg>