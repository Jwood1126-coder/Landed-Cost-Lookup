<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
</head>
<body>
  <h1>Icon Preview</h1>
  <div style="display: flex; gap: 20px; flex-wrap: wrap;">
    <div>
      <p>256x256</p>
      <canvas id="canvas256" width="256" height="256" style="border: 1px solid #ccc;"></canvas>
    </div>
    <div>
      <p>128x128</p>
      <canvas id="canvas128" width="128" height="128" style="border: 1px solid #ccc;"></canvas>
    </div>
    <div>
      <p>64x64</p>
      <canvas id="canvas64" width="64" height="64" style="border: 1px solid #ccc;"></canvas>
    </div>
    <div>
      <p>32x32</p>
      <canvas id="canvas32" width="32" height="32" style="border: 1px solid #ccc;"></canvas>
    </div>
  </div>
  <br>
  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    function drawIcon(ctx, size) {
      const scale = size / 24;

      // Background
      ctx.fillStyle = '#0f1115';
      ctx.fillRect(0, 0, size, size);

      // Rounded rect background
      const padding = size * 0.1;
      const radius = size * 0.15;
      ctx.beginPath();
      ctx.roundRect(padding, padding, size - padding * 2, size - padding * 2, radius);
      ctx.fillStyle = '#161922';
      ctx.fill();

      // Center the icon
      ctx.save();
      ctx.translate(size / 2, size / 2);
      ctx.scale(scale * 0.7, scale * 0.7);
      ctx.translate(-12, -12);

      // Glow effect
      ctx.shadowColor = '#2dd4bf';
      ctx.shadowBlur = 4 * scale;

      // Magnifying glass circle
      ctx.strokeStyle = '#2dd4bf';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.arc(10, 10, 6, 0, Math.PI * 2);
      ctx.stroke();

      // Handle
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(14.5, 14.5);
      ctx.lineTo(20, 20);
      ctx.stroke();

      // Data lines inside
      ctx.shadowBlur = 0;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.7;

      ctx.beginPath();
      ctx.moveTo(7, 8);
      ctx.lineTo(13, 8);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(7, 10.5);
      ctx.lineTo(11, 10.5);
      ctx.stroke();

      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.moveTo(7, 13);
      ctx.lineTo(12, 13);
      ctx.stroke();

      ctx.restore();
    }

    // Draw all sizes
    const sizes = [256, 128, 64, 32];
    sizes.forEach(size => {
      const canvas = document.getElementById('canvas' + size);
      const ctx = canvas.getContext('2d');
      drawIcon(ctx, size);
    });

    function downloadAll() {
      sizes.forEach(size => {
        const canvas = document.getElementById('canvas' + size);
        const link = document.createElement('a');
        link.download = size + 'x' + size + '.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
